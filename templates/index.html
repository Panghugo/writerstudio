<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Writer Studio Web</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>

<body>

    <header>
        <div class="brand">
            <span>✍️ Writer Studio</span>
            <span class="edition-badge">WEB EDITION</span>
        </div>

        <div>
            <input type="text" id="filename-input" class="filename-input" placeholder="Filename (e.g. article1)"
                value="untitled">
            <select id="theme-select" class="theme-select">
                <option value="black_gold">⚫️ Black Gold</option>
                <option value="tech_blue">🔵 Tech Blue</option>
                <option value="paper_white">⚪️ Paper White</option>
                <option value="vintage_press">📜 Vintage Press</option>
            </select>
        </div>

        <div class="actions">
            <button id="settings-open-btn" class="btn btn-secondary">⚙️ Settings</button>
            <button id="blog-publish-btn" class="btn btn-secondary btn-blog">🔗 Sync Blog</button>
            <button id="wechat-publish-btn" class="btn btn-secondary">🚀 Publish</button>
            <button id="generate-btn" class="btn btn-primary">💾 Generate</button>
        </div>
    </header>

    <div class="main-container">
        <div class="editor-pane">
            <div class="toolbar">
                <button class="tool-btn format-btn" data-prefix="# ">H1</button>
                <button class="tool-btn format-btn" data-prefix="## ">H2</button>
                <button class="tool-btn format-btn" data-prefix="**" data-suffix="**">Bold</button>
                <button class="tool-btn format-btn" data-prefix="> ">Quote</button>
                <button class="tool-btn gold format-btn" data-prefix=">> ">✨ 金句卡片</button>
                <div class="toolbar-separator"></div>
                <button id="image-upload-btn" class="tool-btn gold">+ Image</button>
                <input type="file" id="img-upload" class="hidden-file-input" accept="image/*">
                <button class="tool-btn tool-btn-feature"
                    id="feature-upload-btn">🖼️ 头图</button>
                <input type="file" id="feature-upload" class="hidden-file-input" accept="image/*">
                <div class="toolbar-separator"></div>
                <button id="obsidian-open-btn" class="tool-btn tool-btn-obsidian">📂 从
                    Obsidian 加载</button>
            </div>
            <textarea id="markdown-editor" placeholder="Start writing here... Use Markdown."></textarea>
        </div>

        <div class="preview-pane">
            <div id="empty-preview" class="empty-state">
                <div class="empty-icon">📄</div>
                <div>Preview will appear here after generation</div>
            </div>
            <iframe id="preview-frame" class="is-hidden"></iframe>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <h2>Settings</h2>
            <div class="form-group">
                <label>WeChat AppID</label>
                <input type="text" id="st-appid" placeholder="wx...">
            </div>
            <div class="form-group">
                <label>AppSecret</label>
                <input type="password" id="st-secret">
            </div>
            <div class="form-group">
                <label>Author Name</label>
                <input type="text" id="st-author" placeholder="Your Name">
            </div>
            <div class="modal-actions">
                <button id="settings-close-btn" class="btn btn-secondary">Cancel</button>
                <button id="settings-save-btn" class="btn btn-primary">Save</button>
            </div>
        </div>
    </div>

    <!-- Obsidian File Browser Modal -->
    <div id="obsidian-modal" class="modal obsidian-modal">
        <div class="modal-content">
            <h2>📂 从 Obsidian 加载文章</h2>
            <input type="text" id="file-search" class="search-box" placeholder="搜索文件...">
            <div id="file-list-container" class="file-list">
                <div class="loading">加载中...</div>
            </div>
            <div class="modal-actions modal-actions-spaced">
                <button id="obsidian-close-btn" class="btn btn-secondary">取消</button>
                <button id="obsidian-refresh-btn" class="btn btn-secondary">🔄 刷新</button>
            </div>
        </div>
    </div>

    <div id="notification">Action Successful!</div>

    <!-- Configuration from server -->
    <script id="server-config" type="application/json">
        {{ config | default({}) | tojson }}
    </script>

    <script src="{{ url_for('static', filename='js/api.js') }}"></script>
    <script src="{{ url_for('static', filename='js/dom.js') }}"></script>
    <script src="{{ url_for('static', filename='js/editor.js') }}"></script>
    <script src="{{ url_for('static', filename='js/generation.js') }}"></script>
    <script src="{{ url_for('static', filename='js/notifications.js') }}"></script>
    <script src="{{ url_for('static', filename='js/settings.js') }}"></script>
    <script src="{{ url_for('static', filename='js/publishing.js') }}"></script>
    <script src="{{ url_for('static', filename='js/obsidian.js') }}"></script>
    <script src="{{ url_for('static', filename='js/uploads.js') }}"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>

</body>

</html>
